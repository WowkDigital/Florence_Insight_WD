<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florence-2 AI Image Describer</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="logo">
                    <i data-lucide="scan-eye"></i>
                    <h1>Florence<span>Insight</span></h1>
                </div>
                <div class="header-actions">
                    <button id="upload-trigger" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        <span>Add New Image</span>
                    </button>
                </div>
            </div>
            
            <div class="global-settings card">
                <div class="settings-title">
                    <i data-lucide="settings-2"></i>
                    <span>Analyst Dashboard</span>
                </div>
                
                <div class="settings-grid">
                    <div class="presets-container">
                        <label>AI Profile</label>
                        <div class="presets">
                            <button type="button" class="preset-btn active" data-prompt="<CAPTION>" data-tokens="128" data-beams="1" title="Fast, concise description of the main object">Short</button>
                            <button type="button" class="preset-btn" data-prompt="<DETAILED_CAPTION>" data-tokens="512" data-beams="3" title="Standard detailed description including context">Detailed</button>
                            <button type="button" class="preset-btn" data-prompt="<MORE_DETAILED_CAPTION>" data-tokens="1024" data-beams="5" title="Maximum detail analysis (Slower, GPU intensive)">Pro</button>
                        </div>
                    </div>

                    <div class="setting-item">
                        <label title="Maximum number of words/tokens generated by the AI. More = longer description.">
                            Max Tokens <i data-lucide="help-circle"></i>
                            <span id="tokens-val">128</span>
                        </label>
                        <input type="range" id="tokens-slider" min="32" max="2048" step="64" value="128">
                    </div>

                    <div class="setting-item">
                        <label title="Precision of the search algorithm (Beams). Higher value = better quality, but higher GPU load.">
                            Precision (Beams) <i data-lucide="help-circle"></i>
                            <span id="beams-val">1</span>
                        </label>
                        <input type="range" id="beams-slider" min="1" max="15" step="1" value="1">
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- Upload Modal / Overlay (hidden by default) -->
            <div id="upload-overlay" class="overlay hidden">
                <div class="modal card">
                    <button class="modal-close" id="close-modal"><i data-lucide="x"></i></button>
                    <h2>Upload Images</h2>
                    <p>Select images to analyze with Florence-2 AI.</p>
                    
                    <div id="drop-zone" class="drop-zone">
                        <i data-lucide="upload-cloud" class="drop-icon"></i>
                        <p>Drag & drop or <span>click to browse</span></p>
                        <p class="small-text">You can select multiple files</p>
                        <input type="file" id="file-input" accept="image/*" class="hidden" multiple>
                    </div>

                    <div id="file-list-container" class="file-list-container hidden">
                        <h3>Selected Files</h3>
                        <div id="file-list" class="file-list"></div>
                    </div>
                    
                    <div id="preview-area" class="preview-area hidden">
                        <img id="image-preview" src="" alt="Preview">
                        
                        <div class="preview-info">
                            <span id="file-name">filename.jpg</span>
                            <button id="analyze-btn" class="btn btn-accent">
                                <i data-lucide="sparkles"></i>
                                Start Analysis
                            </button>
                        </div>
                    </div>

                    <div id="status-area" class="status-area hidden">
                        <div class="loader"></div>
                        <p>Processing queue...</p>
                    </div>
                </div>
            </div>

            <section class="gallery-section">
                <div class="section-header">
                    <h2>Recent Imports</h2>
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" id="search-input" placeholder="Search descriptions...">
                    </div>
                </div>
                
                <div id="gallery" class="gallery">
                    <!-- Gallery items will be injected here -->
                    <div class="empty-state">
                        <i data-lucide="image"></i>
                        <p>No images imported yet. Start by adding a new image.</p>
                    </div>
                </div>
            </section>
        </main>

        <div id="notification" class="notification hidden">
            <span id="notification-text">Message here</span>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
